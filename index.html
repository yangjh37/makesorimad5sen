<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 상반기 소리MAD 5선</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-8">

  <div id="capture-area" class="bg-gray-900 p-8 rounded-2xl border border-gray-800 w-full max-w-7xl flex flex-col items-center">
    <h1 class="text-3xl font-bold mb-2 text-center text-white">2026 상반기 소리MAD 5선</h1>
    <p class="text-gray-400 mb-8 text-center">올해 상반기를 빛낸 나만의 소리MAD 리스트</p>

    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-5 gap-6 w-full">
      </div>
  </div>

  <div class="mt-8">
    <button id="share-btn" onclick="handleShare()" class="px-10 py-4 rounded-full font-bold text-xl shadow-lg transition-all bg-gray-700 text-gray-500 cursor-not-allowed" disabled>
      이미지 다운로드 및 트위터 공유
    </button>
  </div>

  <script>
    // 상태 관리
    let videos = Array(5).fill({ id: '', title: '', author: '' });

    // 유튜브 ID 추출 정규식
    function getYoutubeId(url) {
      const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/);
      return match ? match[1] : null;
    }

    // 화면 렌더링 함수
    function renderGrid() {
      const grid = document.getElementById('video-grid');
      grid.innerHTML = ''; // 초기화

      videos.forEach((video, index) => {
        const itemHtml = `
          <div class="flex flex-col gap-3">
            <div class="aspect-video bg-gray-800 rounded-xl overflow-hidden border border-gray-700 relative flex items-center justify-center shadow-lg">
              ${video.id ? `
                <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" class="w-full h-full object-cover" crossorigin="anonymous">
                <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-80 p-3 text-sm">
                  <div class="font-bold truncate text-white">${video.title}</div>
                  <div class="text-gray-400 truncate text-xs mt-1">${video.author}</div>
                </div>
              ` : `
                <span class="text-gray-500 text-3xl font-bold">${index + 1}</span>
              `}
            </div>
            <input 
              data-html2canvas-ignore 
              type="text" 
              placeholder="유튜브 링크 입력..." 
              class="w-full p-2.5 rounded-lg bg-gray-800 border border-gray-700 text-white outline-none focus:border-blue-500 transition-colors text-xs"
              onchange="handleInput(${index}, this.value)"
              value="${video.id ? `https://youtu.be/${video.id}` : ''}"
            >
          </div>
        `;
        grid.innerHTML += itemHtml;
      });

      // 5칸이 다 채워졌는지 확인하고 버튼 활성화
      const isAllFilled = videos.every(v => v.id !== '');
      const btn = document.getElementById('share-btn');
      if (isAllFilled) {
        btn.disabled = false;
        btn.className = "px-10 py-4 rounded-full font-bold text-xl shadow-lg transition-all bg-blue-500 hover:bg-blue-600 hover:scale-105 text-white cursor-pointer";
      }
    }

    // 입력창에 값이 들어왔을 때 처리
    async function handleInput(index, url) {
      const id = getYoutubeId(url);
      if (id) {
        videos[index] = { id, title: '정보 불러오는 중...', author: '' };
        renderGrid();

        try {
          // 무료 oEmbed 프록시를 통해 유튜브 정보 가져오기
          const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
          const data = await res.json();
          videos[index] = { id, title: data.title || '정보 없음', author: data.author_name || '' };
        } catch (e) {
          videos[index] = { id, title: '오류 발생', author: '' };
        }
        renderGrid();
      } else {
        videos[index] = { id: '', title: '', author: '' };
        renderGrid();
      }
    }

    // 페이지 접속 시 URL에 있는 ID 읽어오기 (공유 링크로 들어왔을 때)
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      let hasData = false;
      for (let i = 0; i < 5; i++) {
        const id = params.get(`v${i+1}`);
        if (id) {
          hasData = true;
          // 공유된 링크로 들어오면 일단 ID로 썸네일 먼저 띄움
          videos[i] = { id, title: '불러오는 중...', author: '' };
          // 비동기로 제목 정보 업데이트
          fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`)
            .then(r => r.json())
            .then(data => {
              videos[i].title = data.title;
              videos[i].author = data.author_name;
              renderGrid();
            });
        }
      }
      renderGrid();
    };

    // 이미지 캡처 및 트위터 공유 함수
    async function handleShare() {
      const btn = document.getElementById('share-btn');
      btn.innerText = "처리 중...";
      
      // 1. URL 생성 (현재 도메인 뒤에 파라미터 붙이기)
      const params = new URLSearchParams();
      videos.forEach((v, i) => params.append(`v${i+1}`, v.id));
      const shareUrl = `${window.location.origin}${window.location.pathname}?${params.toString()}`;

      // 2. 이미지 캡처 및 다운로드
      const element = document.getElementById('capture-area');
      const canvas = await html2canvas(element, { 
        backgroundColor: '#111827', 
        scale: 2,
        useCORS: true // 외부 이미지(유튜브 썸네일) 허용
      });
      
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = '2026_상반기_소리MAD_5선.png';
      link.click();

      // 3. 트위터 열기
      const text = "나만의 2026 상반기 소리MAD 5선 작성을 완료했습니다! 다운로드된 이미지를 첨부해 보세요.\n";
      const hashtags = "2026소리MAD상반기5선";
      const twitterIntentUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(shareUrl)}&hashtags=${hashtags}`;
      
      window.open(twitterIntentUrl, '_blank', 'width=600,height=400');
      btn.innerText = "이미지 다운로드 및 트위터 공유";
    }
  </script>
</body>
</html>
